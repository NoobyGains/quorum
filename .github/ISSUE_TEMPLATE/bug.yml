name: Bug
description: Something isn't working.
title: "[bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "node --version"
    validations:
      required: true

  - type: input
    id: quorum-version
    attributes:
      label: Quorum version / commit
      placeholder: "v0.0.0-pre-alpha or git SHA"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      render: text
